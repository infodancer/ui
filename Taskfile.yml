version: '3'

tasks:
  check:
    desc: Run all checks (fmt, vet, lint, vulncheck)
    cmds:
      - gofmt -l . | (! grep .)
      - go vet ./...
      - golangci-lint run ./...
      - govulncheck ./...

  test:
    desc: Run tests
    cmds:
      - go test -race -count=1 ./...

  build:
    desc: Verify the Go module builds
    cmds:
      - go build ./...

  fmt:
    desc: Format Go sources
    cmds:
      - gofmt -w .
